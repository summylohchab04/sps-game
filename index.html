<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Stone Paper Scissors Game</h1>
        
        <div class="scoreboard">
            <p>Player: <span id="playerScore">0</span></p>
            <p>Computer: <span id="computerScore">0</span></p>
        </div>
        
        <div class="buttons">
            <button id="stoneBtn">🪨 Stone</button>
            <button id="paperBtn">📄 Paper</button>
            <button id="scissorsBtn">✂️ Scissors</button>
        </div>
        
        <div class="result">
            <p id="resultText">Choose your move!</p>
        </div>
        
        <button id="resetBtn">Reset Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
