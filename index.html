<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Stone Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <h1>Stone Paper Scissors</h1>
        
        <div class="scoreboard">
            <div class="score-card">
                <p>Player</p>
                <span id="playerScore" class="score-number">0</span>
            </div>
            <div class="score-card">
                <p>Computer</p>
                <span id="computerScore" class="score-number">0</span>
            </div>
        </div>
        
        <div class="buttons">
            <button id="stoneBtn" class="game-btn">🪨 Stone</button>
            <button id="paperBtn" class="game-btn">📄 Paper</button>
            <button id="scissorsBtn" class="game-btn">✂️ Scissors</button>
        </div>
        
        <div class="result">
            <p id="resultText">Choose your move!</p>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverModal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modalResultText">🎉 You Won!</h2>
            <button id="resetBtn" class="primary-btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
